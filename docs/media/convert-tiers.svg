<svg viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="880" height="430" fill="#0d1117"/>

  <text x="40" y="44" fill="#e6edf3" font-size="21" font-weight="700">Drop any file: the zero-token conversion ladder</text>

  <!-- step rows: x 40..640, each 58 tall from y=78 -->
  <!-- Tier 0 -->
  <rect x="40" y="78" width="600" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <circle cx="70" cy="104" r="15" fill="#2d1b26" stroke="#f4a0c0" stroke-width="1.6"/>
  <text x="70" y="109" fill="#f4a0c0" font-size="15" font-weight="700" text-anchor="middle">0</text>
  <text x="100" y="100" fill="#e6edf3" font-size="13.5" font-weight="600">Office / CSV / HTML</text>
  <text x="100" y="118" fill="#8b949e" font-size="11.5">markitdown, local</text>

  <!-- Tier 1 -->
  <rect x="40" y="140" width="600" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <circle cx="70" cy="166" r="15" fill="#2d1b26" stroke="#f4a0c0" stroke-width="1.6"/>
  <text x="70" y="171" fill="#f4a0c0" font-size="15" font-weight="700" text-anchor="middle">1</text>
  <text x="100" y="162" fill="#e6edf3" font-size="13.5" font-weight="600">Legacy .ppt / .doc / .xls</text>
  <text x="100" y="180" fill="#8b949e" font-size="11.5">COM convert → markitdown</text>

  <!-- Tier 2 -->
  <rect x="40" y="202" width="600" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <circle cx="70" cy="228" r="15" fill="#2d1b26" stroke="#f4a0c0" stroke-width="1.6"/>
  <text x="70" y="233" fill="#f4a0c0" font-size="15" font-weight="700" text-anchor="middle">2</text>
  <text x="100" y="224" fill="#e6edf3" font-size="13.5" font-weight="600">PDF with a text layer</text>
  <text x="100" y="242" fill="#8b949e" font-size="11.5">extract, local</text>

  <!-- Tier 3 -->
  <rect x="40" y="264" width="600" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <circle cx="70" cy="290" r="15" fill="#26282d" stroke="#e3c07b" stroke-width="1.6"/>
  <text x="70" y="295" fill="#e3c07b" font-size="15" font-weight="700" text-anchor="middle">3</text>
  <text x="100" y="286" fill="#e6edf3" font-size="13.5" font-weight="600">Image-only pages</text>
  <text x="100" y="304" fill="#8b949e" font-size="11.5">render just those pages for a visual read</text>

  <!-- Tier 4 -->
  <rect x="40" y="326" width="600" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.4"/>
  <circle cx="70" cy="352" r="15" fill="#21262d" stroke="#8b949e" stroke-width="1.6"/>
  <text x="70" y="357" fill="#8b949e" font-size="15" font-weight="700" text-anchor="middle">4</text>
  <text x="100" y="348" fill="#e6edf3" font-size="13.5" font-weight="600">Audio / video / unknown</text>
  <text x="100" y="366" fill="#8b949e" font-size="11.5">archive + pointer stub</text>

  <!-- badge column x 664..840 -->
  <!-- 0 model tokens spanning tiers 0-2 -->
  <rect x="664" y="78" width="176" height="176" rx="10" fill="#12211d" stroke="#7fd8d8" stroke-width="1.5"/>
  <text x="752" y="160" fill="#7fd8d8" font-size="15" font-weight="700" text-anchor="middle">≈ 0 model tokens</text>
  <text x="752" y="182" fill="#8b949e" font-size="11.5" text-anchor="middle">tiers 0 – 2, all local</text>

  <!-- per-page only at tier 3 -->
  <rect x="664" y="264" width="176" height="52" rx="10" fill="#26221a" stroke="#e3c07b" stroke-width="1.5"/>
  <text x="752" y="295" fill="#e3c07b" font-size="14" font-weight="700" text-anchor="middle">per-page only</text>

  <!-- 0 at tier 4 -->
  <rect x="664" y="326" width="176" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="752" y="357" fill="#8b949e" font-size="14" font-weight="700" text-anchor="middle">0</text>
</svg>

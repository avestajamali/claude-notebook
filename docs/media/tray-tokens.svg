<svg viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="880" height="430" fill="#0d1117"/>

  <text x="40" y="40" fill="#e6edf3" font-size="21" font-weight="700">Why the context tray pins paths, not bodies</text>

  <!-- plot box: x 90..790 (0..12 notes), y 90..340 (30k..0 chars) -->
  <!-- y gridlines at 0,6k,12k,18k,24k,30k -->
  <!-- y=340 -> 0 ; y=90 -> 30k ; scale = 250/30000 = 0.008333 px per char -->
  <line x1="90" y1="340" x2="790" y2="340" stroke="#30363d" stroke-width="1.4"/>
  <line x1="90" y1="90" x2="90" y2="340" stroke="#30363d" stroke-width="1.4"/>

  <!-- horizontal gridlines + y labels -->
  <line x1="90" y1="290" x2="790" y2="290" stroke="#21262d" stroke-width="1"/>
  <text x="82" y="294" fill="#6e7681" font-size="11" text-anchor="end">6k</text>
  <line x1="90" y1="240" x2="790" y2="240" stroke="#21262d" stroke-width="1"/>
  <text x="82" y="244" fill="#6e7681" font-size="11" text-anchor="end">12k</text>
  <line x1="90" y1="190" x2="790" y2="190" stroke="#21262d" stroke-width="1"/>
  <text x="82" y="194" fill="#6e7681" font-size="11" text-anchor="end">18k</text>
  <text x="82" y="344" fill="#6e7681" font-size="11" text-anchor="end">0</text>

  <!-- 24k truncation cliff (dashed red) at y = 340 - 24000*0.008333 = 340-200 = 140 -->
  <line x1="90" y1="140" x2="790" y2="140" stroke="#f85149" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="786" y="132" fill="#f85149" font-size="12" font-weight="600" text-anchor="end">24k truncation cliff</text>

  <!-- x axis: 0..12 notes, x = 90 + n*58.33 -->
  <!-- ticks at 0,2,4,6,8,10,12 -->
  <text x="90" y="360" fill="#6e7681" font-size="11" text-anchor="middle">0</text>
  <text x="207" y="360" fill="#6e7681" font-size="11" text-anchor="middle">2</text>
  <text x="323" y="360" fill="#6e7681" font-size="11" text-anchor="middle">4</text>
  <text x="440" y="360" fill="#6e7681" font-size="11" text-anchor="middle">6</text>
  <text x="557" y="360" fill="#6e7681" font-size="11" text-anchor="middle">8</text>
  <text x="673" y="360" fill="#6e7681" font-size="11" text-anchor="middle">10</text>
  <text x="790" y="360" fill="#6e7681" font-size="11" text-anchor="middle">12</text>
  <text x="440" y="384" fill="#8b949e" font-size="12.5" text-anchor="middle">pinned notes</text>

  <!-- y axis title -->
  <text x="30" y="215" fill="#8b949e" font-size="12.5" text-anchor="middle" transform="rotate(-90 30 215)">injected characters</text>

  <!-- inject bodies curve: ~6000 chars/note, rises to 24k at 4 notes, then flat at cliff.
       x per note = 58.33 ; y per char = 0.008333
       n=0 -> (90,340) ; n=1 -> (148,290) ; n=2 -> (207,240) ; n=3 -> (265,190) ; n=4 -> (323,140) then flat to n=12 (790,140) -->
  <polyline points="90,340 148,290 207,240 265,190 323,140 790,140" fill="none" stroke="#f4a0c0" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="360" y="128" fill="#f4a0c0" font-size="12.5" font-weight="600">silently truncated</text>
  <text x="150" y="255" fill="#f4a0c0" font-size="12.5" font-weight="600">inject bodies</text>
  <text x="150" y="272" fill="#8b949e" font-size="11">≈ 6,000 chars / note</text>

  <!-- inject paths curve: ~40 chars/note, nearly flat near baseline.
       n=12 -> 480 chars -> y = 340 - 480*0.008333 = 340-4 = 336 -->
  <polyline points="90,340 790,336" fill="none" stroke="#7fd8d8" stroke-width="2.6" stroke-linecap="round"/>
  <text x="470" y="326" fill="#7fd8d8" font-size="12.5" font-weight="600">inject paths (Claude Notebook)</text>
  <text x="470" y="343" fill="#8b949e" font-size="11">≈ 40 chars / note · agent Reads each live file</text>

  <!-- legend -->
  <rect x="620" y="386" width="216" height="30" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.1"/>
  <line x1="634" y1="401" x2="660" y2="401" stroke="#f4a0c0" stroke-width="2.6"/>
  <text x="666" y="405" fill="#8b949e" font-size="11">bodies</text>
  <line x1="722" y1="401" x2="748" y2="401" stroke="#7fd8d8" stroke-width="2.6"/>
  <text x="754" y="405" fill="#8b949e" font-size="11">paths</text>
</svg>

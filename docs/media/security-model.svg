<svg viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="880" height="430" fill="#0d1117"/>

  <text x="40" y="44" fill="#e6edf3" font-size="21" font-weight="700">Every mode runs on an allowlist</text>

  <!-- column headers -->
  <text x="360" y="90" fill="#8b949e" font-size="13" font-weight="600" text-anchor="middle">Read tools</text>
  <text x="360" y="106" fill="#6e7681" font-size="10.5" text-anchor="middle">Read · Grep · Glob · LS · TodoWrite</text>
  <text x="560" y="90" fill="#8b949e" font-size="13" font-weight="600" text-anchor="middle">Write tools</text>
  <text x="560" y="106" fill="#6e7681" font-size="10.5" text-anchor="middle">Write · Edit · MultiEdit</text>
  <text x="740" y="90" fill="#8b949e" font-size="13" font-weight="600" text-anchor="middle">Shell / Web</text>
  <text x="740" y="106" fill="#6e7681" font-size="10.5" text-anchor="middle">Bash · WebFetch · Task</text>

  <!-- vertical separators -->
  <line x1="270" y1="120" x2="270" y2="356" stroke="#30363d" stroke-width="1"/>
  <line x1="452" y1="120" x2="452" y2="356" stroke="#30363d" stroke-width="1"/>
  <line x1="650" y1="120" x2="650" y2="356" stroke="#30363d" stroke-width="1"/>

  <!-- row template: label, read cell, write cell, shell cell -->
  <!-- Chat -->
  <g>
    <text x="52" y="152" fill="#e6edf3" font-size="14" font-weight="600">Chat</text>
    <text x="360" y="152" fill="#f4a0c0" font-size="16" font-weight="700" text-anchor="middle">✓</text>
    <text x="560" y="152" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
    <text x="740" y="152" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
  </g>
  <line x1="40" y1="166" x2="836" y2="166" stroke="#21262d" stroke-width="1"/>

  <!-- Quiz -->
  <g>
    <text x="52" y="196" fill="#e6edf3" font-size="14" font-weight="600">Quiz</text>
    <text x="360" y="196" fill="#f4a0c0" font-size="16" font-weight="700" text-anchor="middle">✓</text>
    <text x="560" y="196" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
    <text x="740" y="196" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
  </g>
  <line x1="40" y1="210" x2="836" y2="210" stroke="#21262d" stroke-width="1"/>

  <!-- Ask vault -->
  <g>
    <text x="52" y="240" fill="#e6edf3" font-size="14" font-weight="600">Ask vault</text>
    <text x="360" y="240" fill="#f4a0c0" font-size="16" font-weight="700" text-anchor="middle">✓</text>
    <text x="560" y="240" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
    <text x="740" y="240" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
  </g>
  <line x1="40" y1="254" x2="836" y2="254" stroke="#21262d" stroke-width="1"/>

  <!-- Edit -->
  <g>
    <text x="52" y="286" fill="#e6edf3" font-size="14" font-weight="600">Edit</text>
    <text x="360" y="286" fill="#f4a0c0" font-size="16" font-weight="700" text-anchor="middle">✓</text>
    <rect x="490" y="270" width="140" height="26" rx="8" fill="#2d1b26" stroke="#f4a0c0" stroke-width="1.2"/>
    <text x="560" y="284" fill="#f4a0c0" font-size="15" font-weight="700" text-anchor="middle">✓</text>
    <text x="560" y="316" fill="#8b949e" font-size="10.5" text-anchor="middle">path-scoped: Edit(//vault/**)</text>
    <text x="740" y="286" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
  </g>
  <line x1="40" y1="330" x2="836" y2="330" stroke="#21262d" stroke-width="1"/>

  <!-- Save note -->
  <g>
    <text x="52" y="356" fill="#e6edf3" font-size="14" font-weight="600">Save note</text>
    <text x="360" y="356" fill="#f4a0c0" font-size="16" font-weight="700" text-anchor="middle">✓</text>
    <rect x="490" y="340" width="140" height="26" rx="8" fill="#2d1b26" stroke="#f4a0c0" stroke-width="1.2"/>
    <text x="560" y="357" fill="#f4a0c0" font-size="15" font-weight="700" text-anchor="middle">✓</text>
    <text x="740" y="356" fill="#6e7681" font-size="16" text-anchor="middle">✕</text>
  </g>

  <!-- footer -->
  <rect x="40" y="384" width="796" height="30" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="52" y="404" fill="#8b949e" font-size="12">Permission mode: <tspan fill="#7fd8d8">default</tspan> (read-only) / <tspan fill="#e3c07b">acceptEdits</tspan> (edit) — <tspan fill="#e6edf3">bypassPermissions never used</tspan></text>
</svg>
